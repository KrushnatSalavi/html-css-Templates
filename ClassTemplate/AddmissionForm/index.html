<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Admission Form</title>
  <style>
    /* Dark Bluish Gradient Background */
    body {
      margin: 0;
      padding: 40px 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #9db3ef;
      color: #000000;
      min-height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Glassmorphism Form Container */
    .form-container {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      width: 100%;
      max-width: 700px;
    }

    .form-container h2 {
      margin-top: 0;
      margin-bottom: 8px;
      color: #022a3b; /* Light blue accent */
      font-size: 2rem;
    }

    .form-container p {
      color: #3d434b;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    /* Form Grid Layout */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 600px) {
      .form-grid {
        grid-template-columns: 1fr 1fr;
      }
      .full-width {
        grid-column: span 2;
      }
    }

    /* Input Groups */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-group label {
      color: #3d4147;
      font-size: 0.9rem;
      font-weight: 500;
    }

    /* Inputs, Selects, and Textarea styling */
    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="date"],
    select,
    textarea {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 12px 14px;
      color: #ffffff;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    /* Fix dark arrow icon for select dropdowns in some browsers */
    select option {
      background-color: #0f172a;
      color: #ffffff;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #353d40;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    /* Gender Radio Custom Styles */
    .radio-group {
      display: flex;
      gap: 20px;
      padding: 12px 0;
    }

    .radio-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: #e2e8f0;
    }

    .radio-label input[type="radio"] {
      accent-color: #3a4042;
      width: 18px;
      height: 18px;
    }

    /* File Upload Styling */
    input[type="file"]::file-selector-button {
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.3);
      color: #3a4246;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 12px;
      transition: background 0.2s;
    }

    input[type="file"]::file-selector-button:hover {
      background: rgba(56, 189, 248, 0.2);
    }

    /* Button Container */
    .btn-container {
      margin-top: 15px;
      display: flex;
      gap: 15px;
      justify-content: flex-end;
    }

    .btn {
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    .btn-submit {
      background: #3d5994;
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .btn-submit:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    .btn-reset {
      background: rgba(255, 255, 255, 0.08);
      color: #cbd5e1;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-reset:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #ffffff;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>Admission Form</h2>
    <p>Please enter your details accurately to apply for the upcoming academic session.</p>

    <form action="#" method="POST" enctype="multipart/form-data">
      <div class="form-grid">
        
        <!-- Full Name -->
        <div class="input-group full-width">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" required>
        </div>

        <!-- Email Address -->
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="johndoe@example.com" required>
        </div>

        <!-- Mobile Number -->
        <div class="input-group">
          <label for="mobile">Mobile Number</label>
          <input type="tel" id="mobile" name="mobile" placeholder="1234567890" pattern="[0-9]{10}" required>
        </div>

        <!-- Gender -->
        <div class="input-group">
          <label>Gender</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="gender" value="male" required> Male
            </label>
            <label class="radio-label">
              <input type="radio" name="gender" value="female"> Female
            </label>
            <label class="radio-label">
              <input type="radio" name="gender" value="other"> Other
            </label>
          </div>
        </div>

        <!-- Date of Birth -->
        <div class="input-group">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" name="dob" required>
        </div>

        <!-- Course Selection -->
        <div class="input-group full-width">
          <label for="course">Select Course</label>
          <select id="course" name="course" required>
            <option value="" disabled selected>Choose a course...</option>
            <option value="bsc-cs">B.Sc. Computer Science</option>
            <option value="bca">Bachelor of Computer Applications (BCA)</option>
            <option value="btech-it">B.Tech Information Technology</option>
            <option value="ba-eng">B.A. English Literature</option>
            <option value="bcom">Bachelor of Commerce (B.Com)</option>
          </select>
        </div>

        <!-- Address -->
        <div class="input-group full-width">
          <label for="address">Permanent Address</label>
          <textarea id="address" name="address" rows="3" placeholder="Street address, City, State, ZIP" required></textarea>
        </div>

        <!-- Photo Upload -->
        <div class="input-group full-width">
          <label for="photo">Upload Passport Size Photo</label>
          <input type="file" id="photo" name="photo" accept="image/*" required>
        </div>

        <!-- Form Actions -->
        <div class="btn-container full-width">
          <button type="reset" class="btn btn-reset">Reset</button>
          <button type="submit" class="btn btn-submit">Submit Application</button>
        </div>

      </div>
    </form>
  </div>

</body>
</html>
